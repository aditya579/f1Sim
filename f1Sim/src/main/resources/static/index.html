<!DOCTYPE html>

  <title>Track Image Viewer</title>
  <style>
    .image-container { margin: 20px; text-align: center; }
    img { max-width: 500px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>

<div class="image-container">
  <button id="fetchBtn">Load Track Image</button>
  <div style="margin-top: 20px;">
    <img id="trackImage" style="display:none;" alt="Track Layout" />
  </div>
</div>

<script>
  document.getElementById('fetchBtn').addEventListener('click', () => {
      const imageName = "track-layout-01.jpg"; // Replace with your dynamic image name
      const imgElement = document.getElementById('trackImage');

      // Approach A: Direct URL binding (Easiest if endpoint is public)
      imgElement.src = `http://localhost:8080/getMapImage`;
      imgElement.style.display = 'block';
